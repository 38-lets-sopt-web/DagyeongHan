<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Week2/Homework/budgetbook/styles.css">
</head>
<body>
  <header>
    <div>💵</div>
    <h1 class="title">다경이의 가계부</h1>
    <p>SOPT 2주차 과제</p>
  </header>

  <main>
    <!-- 검색 필터 영역 -->
    <section>
      <h3>검색 필터</h3>
      <div class="grid">

        <div class="input">
          <div>제목</div>
          <input placeholder="내역을 입력해주세요"/>
        </div>

        <div class="dropdown">
          <div>유형</div>
          <button class="dropdown-btn">
            전체
            <img src="./asset/ic-chevron-down.svg" alt="아래쪽 화살표 아이콘">
          </button>
          <ul class="dropdown-menu">
            <li>전체</li>
            <li>수입</li>
            <li>지출</li>
          </ul>
        </div>

        <div class="dropdown">
          <div>카테고리</div>
          <button class="dropdown-btn">
            전체
            <img src="./asset/ic-chevron-down.svg" alt="아래쪽 화살표 아이콘">
          </button>
          <ul class="dropdown-menu">
            <li>전체</li>
            <li>식비</li>
            <li>월급</li>
            <li>문화</li>
            <li>교통</li>
            <li>생활</li>
            <li>기타</li>
          </ul>
        </div>

        <div class="dropdown">
          <div>결제수단</div>
          <button class="dropdown-btn">
            전체
            <img src="./asset/ic-chevron-down.svg" alt="아래쪽 화살표 아이콘">
          </button>
          <ul class="dropdown-menu">
            <li>전체</li>
            <li>신용카드</li>
            <li>체크카드</li>
            <li>현금</li>
            <li>기타</li>
          </ul>
        </div>

        <button class="apply-btn">적용</button>
        <button class="reset-btn">초기화</button>
      </div>
    </section>

    <!-- 표 영역 -->
    <section>

    </section>

  </main>
</body>
</html>
